<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>FocusStreak</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
            extend: {
                colors: {
                "primary": "#7f13ec",
                "primary-dark": "#660ec1",
                "background-light": "#f7f6f8",
                "background-dark": "#191022",
                "accent-fire": "#FF5722",
                },
                fontFamily: {
                "display": ["Plus Jakarta Sans", "sans-serif"]
                },
                borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
                boxShadow: {
                    "glow": "0 0 60px -15px rgba(127, 19, 236, 0.4)",
                    "btn-glow": "0 8px 30px -5px rgba(127, 19, 236, 0.5)",
                    "inner-glow": "inset 0 0 20px rgba(127, 19, 236, 0.2)"
                },
                animation: {
                    'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                }
            },
            },
        }
    </script>
<style>.progress-ring__circle {
            transition: stroke-dashoffset 0.35s;
            transform: rotate(-90deg);
            transform-origin: 50% 50%;
        }@keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 30px -5px rgba(127, 19, 236, 0.2); }
            50% { box-shadow: 0 0 60px -5px rgba(127, 19, 236, 0.5); }
        }
        .timer-glow {
            animation: pulse-glow 4s infinite ease-in-out;
        }@keyframes subtle-bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-3px); }
        }
        .streak-fire {
            animation: subtle-bounce 2s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white font-display antialiased selection:bg-primary selection:text-white h-screen overflow-hidden flex flex-col justify-between">
<header class="flex-none pt-14 pb-2 px-6 flex flex-col w-full z-10">
<div class="flex items-center justify-between w-full mb-6">
<div class="w-10"></div>
<div class="text-[10px] font-extrabold tracking-[0.2em] text-slate-400 dark:text-slate-500 uppercase opacity-80">
            FocusStreak
        </div>
<button class="w-10 h-10 flex items-center justify-end text-slate-400 dark:text-slate-500 hover:text-slate-800 dark:hover:text-white transition-colors active:opacity-70">
<span class="material-symbols-outlined text-[24px]">settings</span>
</button>
</div>
<div class="flex flex-col items-center">
<button class="group flex items-center gap-3 p-2 -m-2 rounded-2xl hover:bg-slate-200/50 dark:hover:bg-white/5 transition-all duration-200 cursor-pointer active:scale-95">
<span class="material-symbols-outlined text-accent-fire text-4xl streak-fire" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
<span class="text-4xl sm:text-5xl font-extrabold tracking-tight text-slate-800 dark:text-white group-hover:text-primary transition-colors">
                5 Days
            </span>
</button>
<p class="text-slate-500 dark:text-slate-400 text-xs sm:text-sm font-medium mt-3 max-w-[240px] text-center leading-relaxed">
            Keep the momentum going. Complete today's session!
        </p>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center relative w-full px-6">
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-primary/20 blur-[80px] rounded-full pointer-events-none"></div>
<div class="relative w-72 h-72 sm:w-80 sm:h-80 rounded-full bg-background-light dark:bg-[#231630] shadow-glow flex items-center justify-center timer-glow border border-white/5 z-10">
<svg class="absolute inset-0 w-full h-full p-2" viewBox="0 0 100 100">
<circle class="text-slate-200 dark:text-white/5" cx="50" cy="50" fill="transparent" r="46" stroke="currentColor" stroke-width="2.5"></circle>
<circle class="text-primary progress-ring__circle" cx="50" cy="50" fill="transparent" r="46" stroke="currentColor" stroke-dasharray="289.026" stroke-dashoffset="0" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<div class="flex flex-col items-center justify-center z-20">
<span class="text-7xl sm:text-8xl font-bold tracking-tighter tabular-nums leading-none text-slate-800 dark:text-white drop-shadow-sm">
                25:00
            </span>
<span class="text-xs font-bold uppercase tracking-[0.2em] text-primary/80 mt-3">Pomodoro</span>
</div>
</div>
</main>
<footer class="flex-none flex flex-col items-center w-full max-w-md mx-auto px-6 gap-6 z-10 pb-2">
<button class="group relative flex w-full max-w-[320px] h-[72px] cursor-pointer items-center justify-center overflow-hidden rounded-full bg-primary hover:bg-primary-dark transition-all duration-300 active:scale-[0.98] shadow-btn-glow">
<div class="absolute inset-0 bg-gradient-to-tr from-white/0 via-white/10 to-white/0 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-white text-[32px] group-hover:scale-110 transition-transform">play_arrow</span>
<span class="text-white text-[19px] font-bold tracking-wide">Start Focus</span>
</div>
</button>
<div class="w-full flex flex-col items-center justify-center pt-2 pb-1 border-t border-transparent">
<div class="w-[320px] h-[50px] bg-slate-100 dark:bg-white/5 rounded-lg border border-slate-200 dark:border-white/10 flex items-center justify-center backdrop-blur-sm">
<p class="text-[10px] font-mono text-slate-400 dark:text-white/20 uppercase tracking-widest">Ad Space (320x50)</p>
</div>
</div>
<div class="h-5 w-full"></div>
</footer>
</body></html>
