name: Android PR Build

on:
  pull_request:
    branches:
      - "main"
      - "release/**"
  push:
    branches-ignore:
      - "main"
      - "release/**"

# Cancel in-progress runs of the same PR to save CI minutes.
concurrency:
  group: android-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      # Debug build + tests only. No keystore, no signing, no AdMob prod env
      # vars are needed for this workflow.
      - name: Lint & Unit Tests
        run: ./gradlew lint testDebugUnitTest

      - name: Build Debug APK (sanity check)
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
