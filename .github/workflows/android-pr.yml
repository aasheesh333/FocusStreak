name: Android PR Build

on:
  pull_request:
    branches:
      - "main"
      - "release/**"
  push:
    branches-ignore:
      - "main"
      - "release/**"

# Cancel in-progress runs of the same PR to save CI minutes.
concurrency:
  group: android-pr-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      # Optional; debug builds skip OneSignal init if it is blank.
      ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Android build environment
        uses: ./.github/actions/setup-android-env

      # Debug build + tests only. No keystore, no signing, no AdMob prod env
      # vars are needed for this workflow.
      - name: Lint
        run: ./gradlew lintDebug

      - name: Upload Lint Report
        if: failure() || success()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 7

      - name: Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Upload Unit Test Results
        if: failure() || success()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/test-results/testDebugUnitTest/
          retention-days: 7

      - name: Build Debug APK (sanity check)
        run: ./gradlew assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
