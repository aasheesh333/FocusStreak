name: Android Release

on:
  push:
    branches:
      - "main"
      - "release/**"
    tags:
      - "v*"
  workflow_dispatch:

# Prevent overlapping release builds for the same ref.
concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore.jks
          ls -la app/keystore.jks

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Lint & Unit Tests
        run: ./gradlew lint testDebugUnitTest

      - name: Build Release APK and Bundle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PACKAGE_NAME: ${{ secrets.PACKAGE_NAME }}
          VERSION_CODE: ${{ secrets.VERSION_CODE }}
          VERSION_NAME: ${{ secrets.VERSION_NAME }}
          ADMOB_APP_ID: ${{ secrets.ADMOB_APP_ID }}
          ADMOB_BANNER_ID: ${{ secrets.ADMOB_BANNER_ID }}
          ADMOB_INTERSTITIAL_ID: ${{ secrets.ADMOB_INTERSTITIAL_ID }}
          ADMOB_REWARDED_ID: ${{ secrets.ADMOB_REWARDED_ID }}
        run: ./gradlew assembleRelease bundleRelease

      # Clean up the keystore after the build finishes to avoid leaving
      # signing material in the workspace.
      - name: Remove Keystore
        if: always()
        run: rm -f app/keystore.jks

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 14

      - name: Upload Bundle
        uses: actions/upload-artifact@v4
        with:
          name: app-release-bundle
          path: app/build/outputs/bundle/release/app-release.aab
          retention-days: 14

      - name: Upload ProGuard mapping (for crash deobfuscation)
        uses: actions/upload-artifact@v4
        with:
          name: proguard-mapping
          path: app/build/outputs/mapping/release/mapping.txt
          retention-days: 365
